name: Before Test

on:
  push:
    branches: [ main ]

jobs:
  test-before:
    runs-on: ubuntu-latest
    name: Запуск теста ДО рефакторинга
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      
      - name: Install Playwright browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install chromium"
      
      - name: Run Before Test
        run: mvn -Dtest=LoginBeforeTest test
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-before
          path: |
            target/surefire-reports/
            target/failsafe-reports/