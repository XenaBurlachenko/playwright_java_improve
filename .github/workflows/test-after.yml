name: Run After Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Ручной запуск
  schedule:
    - cron: '0 0 * * *' # Запуск каждый день в полночь

jobs:
  test-after:
    runs-on: ubuntu-latest
    name: Запуск теста ПОСЛЕ рефакторинга
    
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
      fail-fast: false # Продолжать запуск даже если один браузер упал
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
      
      - name: Install Playwright browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install ${{ matrix.browser }}"
      
      - name: Run After Test with ${{ matrix.browser }}
        run: mvn -Dtest=LoginAfterTest -Dplaywright.browser=${{ matrix.browser }} test
      
      - name: Upload test results for ${{ matrix.browser }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-after-${{ matrix.browser }}
          path: |
            target/surefire-reports/
            target/failsafe-reports/
      
      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.browser }}
          path: |
            **/*.log
            **/target/*.dumpstream